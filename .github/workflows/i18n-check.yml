name: i18n-key-check

on:
  pull_request:
  push:
    branches:
      - develop
      - main

jobs:
  check-i18n-keys:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify i18n key sync
        run: node scripts/check-i18n-keys.mjs
