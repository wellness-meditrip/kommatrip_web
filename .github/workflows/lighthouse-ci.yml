name: Lighthouse CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  issues: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    environment:
      name: ${{ ((github.event_name == 'pull_request' && github.base_ref) || github.ref_name) == 'main' && 'production' || 'preview' }}
    env:
      BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}
      LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      LIGHTHOUSE_COMPANY_ID: ${{ vars.LIGHTHOUSE_COMPANY_ID }}
      LIGHTHOUSE_LOCALE: ${{ vars.LIGHTHOUSE_LOCALE }}
      LIGHTHOUSE_PROGRAM_ID: ${{ vars.LIGHTHOUSE_PROGRAM_ID }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_SITE_NAME: ${{ vars.NEXT_PUBLIC_SITE_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run Lighthouse CI for Desktop
        run: |
          rm -rf .lighthouseci lhci_reports/desktop
          pnpm dlx @lhci/cli@0.15.1 collect --config=lighthouserc-desktop.cjs
          pnpm dlx @lhci/cli@0.15.1 upload --config=lighthouserc-desktop.cjs

      - name: Upload Desktop Lighthouse status checks
        if: env.LHCI_GITHUB_APP_TOKEN != ''
        run: pnpm dlx @lhci/cli@0.15.1 upload --config=lighthouserc-desktop.cjs --target=temporary-public-storage

      - name: Run Lighthouse CI for Mobile
        run: |
          rm -rf .lighthouseci lhci_reports/mobile
          pnpm dlx @lhci/cli@0.15.1 collect --config=lighthouserc-mobile.cjs
          pnpm dlx @lhci/cli@0.15.1 upload --config=lighthouserc-mobile.cjs

      - name: Upload Mobile Lighthouse status checks
        if: env.LHCI_GITHUB_APP_TOKEN != ''
        run: pnpm dlx @lhci/cli@0.15.1 upload --config=lighthouserc-mobile.cjs --target=temporary-public-storage

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: lhci_reports
          if-no-files-found: ignore

      - name: Comment PR with Lighthouse summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { MANIFEST_MARKER, buildLighthouseComment } = require('./scripts/lighthouse/comment.cjs');

            const body = buildLighthouseComment(process.env.GITHUB_WORKSPACE);
            if (!body) {
              core.warning('No Lighthouse report artifacts were generated.');
              return;
            }

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existingComment = comments.find(
              (comment) => comment.user?.type === 'Bot' && comment.body?.includes(MANIFEST_MARKER)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
