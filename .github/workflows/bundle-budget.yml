name: Bundle Budget

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  bundle-budget:
    runs-on: ubuntu-latest
    environment:
      name: ${{ ((github.event_name == 'pull_request' && github.base_ref) || github.ref_name) == 'main' && 'production' || 'preview' }}
    env:
      BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_SITE_NAME: ${{ vars.NEXT_PUBLIC_SITE_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Print bundle report
        run: pnpm analyze:bundle

      - name: Check bundle budget
        run: pnpm check:bundle-budget
